<body class="shop-list-body">
    <div class="shop-list-background"></div>
    <app-navbar></app-navbar>
    <article class="shop-list-container">
        <section class="shop-list-header">
            <h1>{{ 'SHOP.PRODUCTS_TITLE' | translate }}</h1>
            <p>{{ 'SHOP.PRODUCTS_SUBTITLE' | translate }}</p>
        </section>
        <section *ngIf="loading" class="shop-list-loading">
            <p>{{ 'SHOP.LOADING' | translate }}</p>
        </section>
        <section *ngIf="error && !loading" class="shop-list-error">
            <p>{{ error | translate }}</p>
            <button (click)="loadProducts()" class="shop-list-btn-retry">{{ 'SHOP.RETRY' | translate }}</button>
        </section>
        <section *ngIf="!loading && !error && products.length > 0" class="shop-list-grid">
            <a *ngFor="let product of products" [routerLink]="['/shop/product', product.id]" class="shop-list-card-link cursor-pointer">
                <div class="shop-list-card cursor-pointer">
                    <div class="shop-list-image cursor-pointer">
                        <img [src]="product.image" [alt]="product.name" class="shop-list-img cursor-pointer">
                    </div>
                    <div class="shop-list-info cursor-pointer">
                        <h3 class="shop-list-name cursor-pointer">{{ product.name }}</h3>
                        <p class="shop-list-description cursor-pointer">{{ product.description }}</p>
                        <div class="shop-list-footer cursor-pointer">
                            <span class="shop-list-price cursor-pointer">€{{ product.price.toFixed(2) }}</span>
                            <span class="shop-list-arrow cursor-pointer"></span>
                        </div>
                    </div>
                </div>
            </a>
        </section>
        <section *ngIf="!loading && !error && products.length === 0" class="shop-list-empty">
            <p>{{ 'SHOP.NO_PRODUCTS' | translate }}</p>
        </section>
    </article>
    <app-footer></app-footer>
    <app-contextmenu></app-contextmenu>
</body>
